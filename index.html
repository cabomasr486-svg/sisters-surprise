<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Page ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f001a,#1a0033,#000);
color:white;
text-align:center;
overflow:hidden;
}

.page{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

.active{
display:flex;
}

.card{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(255,0,150,0.3);
width:85%;
max-width:350px;
}

/* TikTok Loader */

.loader-circle{

width:120px;
height:120px;
border-radius:50%;
border:6px solid rgba(255,255,255,0.1);
border-top:6px solid #ff0080;
border-right:6px solid #8000ff;

animation:spin 1s linear infinite;

display:flex;
align-items:center;
justify-content:center;
margin:auto;
}

.loader-heart{

font-size:35px;
animation:pulse 1s infinite;

}

@keyframes spin{

0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}

}

@keyframes pulse{

0%,100%{transform:scale(1);}
50%{transform:scale(1.3);}

}

.dots{
margin-top:15px;
}

.dot{
display:inline-block;
width:8px;
height:8px;
background:#ff0080;
border-radius:50%;
margin:5px;
animation:bounce 1s infinite alternate;
}

.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}

@keyframes bounce{
from{transform:translateY(0);}
to{transform:translateY(-10px);}
}

/* Input */

input{

width:90%;
padding:12px;
border:none;
border-radius:10px;
margin-top:15px;
font-size:16px;
text-align:center;

}

button{

margin-top:15px;
padding:12px 30px;
border:none;
border-radius:12px;
font-size:18px;
background:linear-gradient(45deg,#ff0080,#8000ff);
color:white;
cursor:pointer;

}

/* Image */

img{

width:160px;
height:160px;
border-radius:50%;
margin:15px;
border:4px solid #ff0080;
object-fit:cover;

}

/* Hearts */

.heart{
position:absolute;
color:red;
animation:fall linear infinite;
}

@keyframes fall{

0%{transform:translateY(-100px);}
100%{transform:translateY(100vh);}

}

</style>
</head>

<body>

<div id="hearts"></div>

<!-- Login -->
<div id="loginPage" class="page active">

<div class="card">

<h2>توأني يا روحي 😂❤️</h2>

<input type="password" id="pass" placeholder="ادخل الباسورد">

<button onclick="login()">دخول</button>

</div>

</div>

<!-- Loading TikTok Style -->
<div id="loadingPage" class="page">

<div>

<div class="loader-circle">
<div class="loader-heart">❤️</div>
</div>

<div style="margin-top:20px;font-size:20px">
جاري التحميل السينمائي
</div>

<div class="dots">
<span class="dot"></span>
<span class="dot"></span>
<span class="dot"></span>
</div>

</div>

</div>

<!-- Content -->
<div id="contentPage" class="page">

<div class="card">

<h2 id="name"></h2>

<img id="photo">

<p id="message"></p>

<button onclick="back()">رجوع</button>

</div>

</div>

<audio id="audio"></audio>

<script>

/* البيانات */

const data={

"زوزه":{
name:"زينب ❤️",
img:"zainab.jpg",
audio:"zainab.mp3",
msg:"اختي الغاليه ربنا يخليكي ليا ❤️"
},

"ايمي":{
name:"إيمان ❤️",
img:"eman.jpg",
audio:"eman.mp3",
msg:"ربنا يحفظك ويخليكي ليا ❤️"
},

"رورو":{
name:"رقيه ❤️",
img:"rokaia.jpg",
audio:"rokaia.mp3",
msg:"ربنا يخليكي ليا دايما ❤️"
}

};

/* login */

function login(){

const pass=document.getElementById("pass").value;

if(data[pass]){

showLoading(pass);

}else{

alert("الباسورد غلط");

}

}

/* loading */

function showLoading(pass){

document.getElementById("loginPage").classList.remove("active");

document.getElementById("loadingPage").classList.add("active");

setTimeout(()=>{

showContent(pass);

},2500);

}

/* show content */

function showContent(pass){

const person=data[pass];

document.getElementById("loadingPage").classList.remove("active");

document.getElementById("contentPage").classList.add("active");

document.getElementById("name").innerText=person.name;

document.getElementById("photo").src=person.img;

document.getElementById("message").innerText=person.msg;

const audio=document.getElementById("audio");

audio.src=person.audio;

audio.play();

}

/* back */

function back(){

document.getElementById("contentPage").classList.remove("active");

document.getElementById("loginPage").classList.add("active");

document.getElementById("audio").pause();

}

/* hearts */

function heart(){

const h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"%";

h.style.animationDuration=(Math.random()*3+3)+"s";

document.body.appendChild(h);

setTimeout(()=>h.remove(),6000);

}

setInterval(heart,400);

</script>

</body>
</html>
