<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Page 💜</title>

<style>

body{
margin:0;
font-family:Tahoma;
overflow:hidden;
background:black;
}

/* Background Gradient */
#loginScreen{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(-45deg,#14002b,#240046,#3c096c,#5a189a);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Smoke */
.smoke{
position:absolute;
width:200%;
height:200%;
background:url("https://i.ibb.co/4f1Z6Xk/smoke.png");
background-size:cover;
opacity:0.1;
animation:smokeMove 60s linear infinite;
}

@keyframes smokeMove{
from{transform:translateX(-50%) translateY(-50%) rotate(0deg);}
to{transform:translateX(0%) translateY(0%) rotate(360deg);}
}

/* Stars */
.stars{
position:absolute;
width:100%;
height:100%;
background:url("https://assets.codepen.io/13471/sparkles.gif");
opacity:0.2;
}

/* Floating Hearts */
.heart{
position:absolute;
color:#ff4da6;
font-size:22px;
animation:floatUp 8s linear infinite;
opacity:0.6;
}

@keyframes floatUp{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

/* Glass Box */
.login-box{
position:relative;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
padding:40px;
border-radius:30px;
text-align:center;
box-shadow:0 0 40px rgba(255,0,200,0.4);
animation:fadeIn 2s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:scale(0.8);}
to{opacity:1;transform:scale(1);}
}

/* Loader Circle */
.circle{
width:130px;
height:130px;
border-radius:50%;
border:6px solid rgba(255,255,255,0.2);
border-top:6px solid #ff4da6;
border-right:6px solid #7a5cff;
animation:spin 2s linear infinite;
display:flex;
justify-content:center;
align-items:center;
margin:auto;
margin-bottom:25px;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

.circle span{
font-size:35px;
color:#ff4da6;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}
}

/* Text */
#loadingText{
color:white;
font-size:22px;
margin-bottom:15px;
letter-spacing:1px;
}

/* Input */
input{
padding:12px;
border-radius:12px;
border:none;
margin-top:10px;
width:220px;
text-align:center;
outline:none;
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#ff4da6,#7a5cff);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

</style>
</head>

<body>

<div id="loginScreen">

<div class="smoke"></div>
<div class="stars"></div>

<div class="login-box">

<div class="circle">
<span>❤</span>
</div>

<h2 id="loadingText">جاري التحميل</h2>

<input type="password" id="mainPass" placeholder="ادخل الباسورد">
<br>
<button onclick="checkMain()">دخول</button>

</div>
</div>

<script>

/* Floating hearts generate */
setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerText="❤";
heart.style.left=Math.random()*100+"%";
heart.style.fontSize=(15+Math.random()*25)+"px";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),8000);
},600);

/* Changing text */
let texts=["جاري التحميل","ثواني يا روحي 😂","قربنا نوصل ✨"];
let i=0;

setInterval(()=>{
i++;
if(i>=texts.length)i=0;
document.getElementById("loadingText").innerText=texts[i];
},2500);

/* Password */
function checkMain(){
if(document.getElementById("mainPass").value=="love"){
alert("تم الدخول بنجاح 💜");
}
}

</script>

</body>
</html>
