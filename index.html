<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Sisters ❤️</title>

<style>

/* Reset */

body{
margin:0;
background:black;
font-family:Arial;
color:white;
overflow:hidden;
text-align:center;
}

/* النجوم */

.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
animation:starsMove 100s linear infinite;
z-index:-3;
}

@keyframes starsMove{
from{background-position:0 0}
to{background-position:10000px 5000px}
}

/* دخان */

.smoke{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at center,rgba(255,255,255,0.08),transparent);
animation:smokeMove 8s infinite alternate ease-in-out;
z-index:-2;
}

@keyframes smokeMove{
from{transform:scale(1)}
to{transform:scale(1.4)}
}

/* loading */

#loading{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
}

.loader{
border:5px solid transparent;
border-top:5px solid pink;
border-radius:50%;
width:80px;
height:80px;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

.loadingText{
margin-top:20px;
font-size:22px;
animation:glow 2s infinite alternate;
}

/* glow */

@keyframes glow{
from{text-shadow:0 0 10px pink}
to{text-shadow:0 0 30px red,0 0 50px pink}
}

/* login */

#login{
display:none;
position:fixed;
width:100%;
height:100%;
background:url("cover.jpg") center/cover no-repeat;
justify-content:center;
align-items:center;
flex-direction:column;
}

.loginBox{
background:rgba(0,0,0,0.5);
padding:30px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 0 40px pink;
}

input,button{
padding:12px;
border:none;
border-radius:20px;
margin-top:10px;
font-size:18px;
}

/* main */

#mainPage{
display:none;
padding-top:40px;
}

.cover{
width:240px;
border-radius:20px;
box-shadow:0 0 40px pink;
animation:float 4s infinite;
}

@keyframes float{
50%{transform:translateY(-15px)}
}

/* cards 3D */

.cards{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
margin-top:30px;
}

.card{
width:180px;
height:240px;
perspective:1000px;
cursor:pointer;
}

.cardInner{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
transition:1s;
}

.card:hover .cardInner{
transform:rotateY(180deg);
}

.cardFront,.cardBack{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:20px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
box-shadow:0 0 30px pink;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.cardFront img{
width:140px;
border-radius:15px;
}

.cardBack{
transform:rotateY(180deg);
font-size:22px;
}

/* private */

#privatePage{
display:none;
padding-top:40px;
}

#privatePage img{
width:260px;
border-radius:20px;
box-shadow:0 0 40px pink;
animation:zoom 2s;
}

@keyframes zoom{
from{transform:scale(0)}
to{transform:scale(1)}
}

/* typing */

.typing{
border-right:3px solid white;
display:inline-block;
padding-right:5px;
font-size:20px;
margin-top:15px;
}

/* hearts */

.heart{
position:fixed;
bottom:-10px;
animation:hearts 5s linear infinite;
}

@keyframes hearts{
to{
transform:translateY(-100vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="stars"></div>
<div class="smoke"></div>

<!-- loading -->

<div id="loading">

<div class="loader"></div>

<div class="loadingText">Loading cinematic experience...</div>

</div>

<!-- login -->

<div id="login">

<div class="loginBox">

<h2 class="loadingText">Enter Love Password ❤️</h2>

<input type="password" id="pass">

<br>

<button onclick="enter()">دخول</button>

</div>

</div>

<!-- main -->

<div id="mainPage">

<img src="cover.jpg" class="cover">

<h1 class="loadingText">اخواتي وحبايب قلبي ❤️</h1>

<p onclick="showMsg()">اضغطي هنا لرسالة خاصة 💌</p>

<p id="msg" class="typing"></p>

<div class="cards">

<div class="card" onclick="openPerson('zainab')">
<div class="cardInner">

<div class="cardFront">
<img src="zainab.jpg">
</div>

<div class="cardBack">
Zainab ✨
</div>

</div>
</div>

<div class="card" onclick="openPerson('eman')">
<div class="cardInner">

<div class="cardFront">
<img src="eman.jpg">
</div>

<div class="cardBack">
Eman ✨
</div>

</div>
</div>

<div class="card" onclick="openPerson('rokaia')">
<div class="cardInner">

<div class="cardFront">
<img src="rokaia.jpg">
</div>

<div class="cardBack">
Rokaia ✨
</div>

</div>
</div>

</div>

</div>

<!-- private -->

<div id="privatePage">

<img id="personImg">

<h1 id="personName" class="loadingText"></h1>

<p id="personMsg" class="typing"></p>

</div>

<audio id="mainMusic" src="main.mp3" loop></audio>
<audio id="zainabMusic" src="zainab.mp3" loop></audio>
<audio id="emanMusic" src="eman.mp3" loop></audio>
<audio id="rokaiaMusic" src="rokaia.mp3" loop></audio>

<script>

/* loading */

setTimeout(()=>{
loading.style.display="none"
login.style.display="flex"
},3000)

const mainMusic=document.getElementById("mainMusic")

const music={
zainab:zainabMusic,
eman:emanMusic,
rokaia:rokaiaMusic
}

const passwords={
zainab:"زوزه",
eman:"إيمي",
rokaia:"رورو"
}

const messages={
zainab:"اختي الغاليه يا اغلي الناس ربنا يخليكي ليا ويحفظك ❤️",
eman:"اختي الغاليه يا اغلي الناس ربنا يخليكي ليا ويحفظك ❤️",
rokaia:"اختي الغاليه يا اغلي الناس ربنا يخليكي ليا ويحفظك ❤️"
}

function enter(){

if(pass.value==="love"){

login.style.display="none"
mainPage.style.display="block"

mainMusic.play()

hearts()

}else alert("Wrong password")

}

function openPerson(name){

let p=prompt("الباسورد")

if(p===passwords[name]){

mainMusic.pause()

for(let m in music)music[m].pause()

music[name].play()

mainPage.style.display="none"

privatePage.style.display="block"

personImg.src=name+".jpg"

personName.innerText=name

typeText(personMsg,messages[name])

}else alert("غلط")

}

/* typing */

function typeText(el,text){

el.innerHTML=""

let i=0

let interval=setInterval(()=>{

el.innerHTML+=text[i]

i++

if(i>=text.length)clearInterval(interval)

},40)

}

/* hearts */

function hearts(){

setInterval(()=>{

let h=document.createElement("div")

h.innerHTML="❤️"

h.className="heart"

h.style.left=Math.random()*100+"vw"

h.style.fontSize=Math.random()*30+20+"px"

document.body.appendChild(h)

setTimeout(()=>h.remove(),5000)

},300)

}

</script>

</body>
</html>
