<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>اخواتي ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
overflow:hidden;
}

/* النجوم */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:url("https://i.imgur.com/9QZ7GQy.png");
animation:stars 80s linear infinite;
opacity:0.4;
}

@keyframes stars{
from{background-position:0 0;}
to{background-position:2000px 2000px;}
}

/* دخان */
body::after{
content:"";
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle,transparent,black);
opacity:0.6;
}

/* الصفحات */
.page{
position:absolute;
width:100%;
height:100%;
display:none;
}

/* glass */
.glass{
background:rgba(255,255,255,0.1);
border-radius:20px;
padding:20px;
margin:10px;
backdrop-filter:blur(20px);
box-shadow:0 0 40px rgba(255,255,255,0.3);
}

/* الاسم */
.name{
font-size:35px;
text-shadow:0 0 20px pink,0 0 50px red;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px pink;}
to{text-shadow:0 0 40px red;}
}

/* صورة */
.photo{
width:220px;
border-radius:20px;
box-shadow:0 0 30px pink;
}

/* زر */
button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:pink;
color:black;
cursor:pointer;
}

/* قلوب */
.heart{
position:fixed;
color:red;
font-size:20px;
animation:float 5s linear infinite;
}

@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

/* cover */
.cover{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

input{
padding:10px;
font-size:18px;
border-radius:10px;
border:none;
}

</style>
</head>
<body>

<!-- صوت -->
<audio id="mainMusic" src="main.mp3" loop></audio>
<audio id="zainabMusic" src="zainab.mp3" loop></audio>
<audio id="emanMusic" src="eman.mp3" loop></audio>
<audio id="rokaiaMusic" src="rokaia.mp3" loop></audio>

<!-- شاشة الباسورد -->
<div id="loginPage" class="page" style="display:block">

<div style="position:absolute;top:40%;width:100%">

<div class="glass">

<h1>ادخل الباسورد ❤️</h1>

<input id="mainPass">

<br><br>

<button onclick="checkMain()">دخول</button>

</div>

</div>

</div>

<!-- loading -->
<div id="loadingPage" class="page">

<div style="position:absolute;top:45%;width:100%">
<h1>جاري التحميل...</h1>
</div>

</div>

<!-- الصفحة الرئيسية -->
<div id="mainPage" class="page">

<img src="cover.jpg" class="cover">

<div style="position:relative;top:20%">

<div class="glass">

<h1>اخواتي وحبايب قلبي ❤️</h1>

<button onclick="showNames()">اضغط هنا</button>

<div id="names" style="display:none">

<div class="glass" onclick="openPerson('زوزه','zainab')">زينب</div>

<div class="glass" onclick="openPerson('إيمي','eman')">إيمان</div>

<div class="glass" onclick="openPerson('رورو','rokaia')">رقيه</div>

</div>

</div>

</div>

</div>

<!-- صفحة الشخص -->
<div id="personPage" class="page">

<div style="position:absolute;top:10%;width:100%">

<div class="glass">

<h1 id="personName" class="name"></h1>

<img id="personPhoto" class="photo">

<p id="personMsg"></p>

<div class="glass">

<div id="birthText"></div>

<br>

<div id="ageText"></div>

</div>

<button onclick="back()">رجوع</button>

</div>

</div>

</div>

<script>

/* باسورد رئيسي */
function checkMain(){

if(mainPass.value=="love"){

loginPage.style.display="none";

loadingPage.style.display="block";

setTimeout(()=>{

loadingPage.style.display="none";

mainPage.style.display="block";

mainMusic.play();

},2000);

}else{

alert("الباسورد غلط");

}

}

/* اظهار الاسماء */
function showNames(){
names.style.display="block";
}

/* فتح شخص */
function openPerson(pass,name){

let p=prompt("الباسورد");

if(p!=pass){
alert("غلط");
return;
}

mainMusic.pause();

mainPage.style.display="none";

personPage.style.display="block";

let music;
let msg;
let birth;
let birthString;

if(name=="zainab"){

personPhoto.src="zainab.jpg";
music=zainabMusic;

birth=new Date(2000,8,16);

birthString="16 / 9 / 2000";

msg="اختي الغاليه يا اغلي الناس ربنا يخليكي ليا ويحفظك من كل شر ويفرحك علطول واتمني اشوفك اكتر مابتخيل ❤️";

}

if(name=="eman"){

personPhoto.src="eman.jpg";
music=emanMusic;

birth=new Date(2002,1,12);

birthString="12 / 2 / 2002";

msg="اختي الغاليه يا اغلي الناس ربنا يخليكي ليا ويحفظك من كل شر ويفرحك علطول واتمني اشوفك اكتر مابتخيل ❤️";

}

if(name=="rokaia"){

personPhoto.src="rokaia.jpg";
music=rokaiaMusic;

birth=new Date(2005,11,12);

birthString="12 / 12 / 2005";

msg="اختي الغاليه يا اغلي الناس ربنا يخليكي ليا ويحفظك من كل شر ويفرحك علطول واتمني اشوفك اكتر مابتخيل ❤️";

}

music.play();

personName.innerText=name;

birthText.innerText="تاريخ الميلاد: "+birthString;

/* كتابة الرسالة */
let i=0;
personMsg.innerText="";

let inter=setInterval(()=>{

personMsg.innerText+=msg[i];

i++;

if(i>=msg.length) clearInterval(inter);

},50);

/* عداد */
setInterval(()=>{

let now=new Date();

let diff=now-birth;

let sec=Math.floor(diff/1000)%60;
let min=Math.floor(diff/60000)%60;
let hour=Math.floor(diff/3600000)%24;
let day=Math.floor(diff/86400000)%30;
let month=Math.floor(diff/2592000000)%12;
let year=Math.floor(diff/31536000000);

ageText.innerHTML=

year+" سنة "+month+" شهر "+day+" يوم<br>"+

hour+" ساعة "+min+" دقيقة "+sec+" ثانية";

},1000);

/* قلوب */
setInterval(()=>{

let heart=document.createElement("div");

heart.className="heart";

heart.innerText="❤️";

heart.style.left=Math.random()*100+"%";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),5000);

},300);

}

function back(){
location.reload();
}

</script>

</body>
</html>
