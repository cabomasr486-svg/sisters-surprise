<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اخواتي وروحي ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1a0026,#4a0072,#8e24aa);
color:white;
text-align:center;
overflow-x:hidden;
}

/* القلوب */
.heart{
position:fixed;
bottom:-20px;
font-size:20px;
animation:floatUp 6s linear infinite;
opacity:0.7;
}

@keyframes floatUp{
0%{transform:translateY(0);}
100%{transform:translateY(-100vh);}
}

/* الكارت */
.card{
background:rgba(255,255,255,0.08);
padding:20px;
margin:20px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 0 20px rgba(255,0,150,0.3);
}

/* الأزرار */
button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:15px;
background:linear-gradient(45deg,#ff0080,#7b1fa2);
color:white;
font-size:16px;
cursor:pointer;
}

/* الإدخال */
input{
padding:12px;
border-radius:10px;
border:none;
margin:10px;
width:200px;
text-align:center;
}

/* الصور */
img{
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
margin:10px;
box-shadow:0 0 15px #ff0080;
}

/* اخفاء */
.hidden{
display:none;
}

/* الاسم */
.name{
font-size:28px;
color:#ff80ab;
text-shadow:0 0 10px #ff0080;
}

/* العداد */
.counter{
font-size:20px;
margin-top:10px;
color:#80d8ff;
}

</style>
</head>
<body>

<!-- الأغاني -->
<audio id="mainMusic" src="main.mp3" loop></audio>
<audio id="zainabMusic" src="zainab.mp3" loop></audio>
<audio id="emanMusic" src="eman.mp3" loop></audio>
<audio id="rokiaMusic" src="rokia.mp3" loop></audio>

<!-- شاشة الدخول -->
<div id="login" class="card">

<h2>😂 ثواني يا روحي</h2>

<input type="password" id="mainPass" placeholder="ادخل الباسورد">

<br>

<button onclick="checkMain()">دخول</button>

</div>

<!-- الصفحة العامة -->
<div id="home" class="hidden">

<div class="card">

<img src="cover.gif">

<p>
اختي الغاليه يا اغلي الناس ربنا يخليكي ليا ❤️  
ويحفظك من كل شر ويفرحك علطول 🤲  
واتمني اشوفك اكتر مابتخيل 🥺  
</p>

<h3>اختار اسمك</h3>

<button onclick="openPass('zainab')">زينب</button>
<button onclick="openPass('eman')">ايمان</button>
<button onclick="openPass('rokia')">رقيه</button>

</div>

</div>

<!-- باسورد خاص -->
<div id="userPass" class="hidden card">

<h3 id="userTitle"></h3>

<input type="password" id="userPassword" placeholder="الباسورد">

<br>

<button onclick="checkUser()">فتح</button>

</div>

<!-- صفحة زينب -->
<div id="zainab" class="hidden card">

<div class="name">Zainab</div>

<img src="zainab.jpg">

<p>اختي الغاليه ربنا يخليكي ليا ❤️</p>

<div id="zainabCounter" class="counter"></div>

<button onclick="backHome()">رجوع</button>

</div>

<!-- صفحة ايمان -->
<div id="eman" class="hidden card">

<div class="name">Eman</div>

<img src="eman.jpg">

<p>اختي الغاليه ربنا يخليكي ليا ❤️</p>

<div id="emanCounter" class="counter"></div>

<button onclick="backHome()">رجوع</button>

</div>

<!-- صفحة رقيه -->
<div id="rokia" class="hidden card">

<div class="name">Rokia</div>

<img src="rokia.jpg">

<p>اختي الغاليه ربنا يخليكي ليا ❤️</p>

<div id="rokiaCounter" class="counter"></div>

<button onclick="backHome()">رجوع</button>

</div>

<script>

/* الباسوردات */

const mainPassword="love";

const passwords={
zainab:"zainab",
eman:"eman",
rokia:"rokia"
};

let currentUser="";

/* الدخول الرئيسي */

function checkMain(){

let pass=document.getElementById("mainPass").value;

if(pass===mainPassword){

document.getElementById("login").style.display="none";
document.getElementById("home").style.display="block";

document.getElementById("mainMusic").play();

}else{

alert("الباسورد غلط");

}

}

/* فتح باسورد المستخدم */

function openPass(user){

currentUser=user;

document.getElementById("home").style.display="none";
document.getElementById("userPass").style.display="block";

document.getElementById("userTitle").innerText="ادخل باسورد "+user;

}

/* تحقق باسورد المستخدم */

function checkUser(){

let pass=document.getElementById("userPassword").value;

if(pass===passwords[currentUser]){

document.getElementById("userPass").style.display="none";
document.getElementById(currentUser).style.display="block";

/* ايقاف الكل */

stopAllMusic();

/* تشغيل الخاص */

document.getElementById(currentUser+"Music").play();

}else{

alert("الباسورد غلط");

}

}

/* رجوع */

function backHome(){

stopAllMusic();

document.getElementById("mainMusic").play();

document.getElementById("zainab").style.display="none";
document.getElementById("eman").style.display="none";
document.getElementById("rokia").style.display="none";

document.getElementById("home").style.display="block";

}

/* ايقاف الكل */

function stopAllMusic(){

document.getElementById("mainMusic").pause();
document.getElementById("zainabMusic").pause();
document.getElementById("emanMusic").pause();
document.getElementById("rokiaMusic").pause();

}

/* القلوب */

setInterval(()=>{

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

},500);

/* العداد */

function ageCounter(id,year,month,day){

let now=new Date();

let birth=new Date(year,month-1,day);

let diff=now-birth;

let days=Math.floor(diff/(1000*60*60*24));

let years=Math.floor(days/365);

days%=365;

let months=Math.floor(days/30);

days%=30;

document.getElementById(id).innerHTML=
years+" سنة "+months+" شهر "+days+" يوم";

}

setInterval(()=>{

ageCounter("zainabCounter",2005,9,1);
ageCounter("emanCounter",2007,2,1);
ageCounter("rokiaCounter",2003,12,1);

},1000);

</script>

</body>
</html>
