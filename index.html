<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💜 اخواتي وروحي</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
overflow:hidden;
}

/* خلفية النجوم */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:url("https://i.imgur.com/YKY28eT.jpg");
background-size:cover;
z-index:-2;
}

/* القلوب */
.heart{
position:fixed;
color:red;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0;}
100%{transform:translateY(-10vh);opacity:1;}
}

/* كارت */
.card{
background:rgba(255,255,255,0.08);
padding:25px;
margin:20px;
border-radius:20px;
backdrop-filter:blur(10px);
}

/* input */
input{
padding:12px;
border-radius:10px;
border:none;
width:200px;
font-size:16px;
}

/* button */
button{
padding:12px 25px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,purple,pink);
color:white;
font-size:18px;
margin-top:10px;
}

/* loading */
#loading{
display:none;
position:fixed;
width:100%;
height:100%;
background:black;
justify-content:center;
align-items:center;
flex-direction:column;
}

.loader{
border:6px solid #333;
border-top:6px solid pink;
border-radius:50%;
width:60px;
height:60px;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

/* الصفحة العامة */
#home{display:none;}
#person{display:none;}

img{
width:200px;
border-radius:20px;
margin-top:10px;
}

.name{
font-size:28px;
color:pink;
text-shadow:0 0 10px pink;
}

/* عداد */
.age{
margin-top:10px;
font-size:18px;
color:lightblue;
}

</style>
</head>

<body>

<!-- loading -->
<div id="loading">
<div class="loader"></div>
<h2>جاري التحميل السينمائي ❤️</h2>
</div>

<!-- login -->
<div id="login" class="card">
<h2>❤️ ادخل الباسورد</h2>
<input id="pass" placeholder="الباسورد">
<br>
<button onclick="login()">دخول</button>
</div>

<!-- الصفحة العامة -->
<div id="home">

<div class="card">

<img src="cover.gif">

<h2>اخواتي وحبايب قلبي 🥺❤️</h2>

<button onclick="openPerson('zainab')">زينب</button>
<button onclick="openPerson('eman')">إيمان</button>
<button onclick="openPerson('rokaia')">رقية</button>

</div>

</div>

<!-- صفحة الشخص -->
<div id="person">

<div class="card">

<div class="name" id="personName"></div>

<img id="personImg">

<div id="personMsg"></div>

<div class="age" id="age"></div>

<button onclick="back()">رجوع</button>

</div>

</div>

<!-- الموسيقى -->
<audio id="mainMusic" src="main.mp3" loop></audio>
<audio id="music"></audio>

<script>

// البيانات
const data={

love:true,

zainab:{
pass:"زوزه",
img:"zainab.jpg",
music:"zainab.mp3",
birth:"2000-09-16",
msg:"اختي الكبيره الغاليه يا اغلي الناس ربنا يخليكي ليا ويحفظك من كل شر ❤️"
},

eman:{
pass:"إيمي",
img:"eman.jpg",
music:"eman.mp3",
birth:"2002-02-12",
msg:"اختي الغاليه يا اغلي الناس ربنا يخليكي ليا ويحفظك من كل شر ❤️"
},

rokaia:{
pass:"رورو",
img:"rokaia.jpg",
music:"rokaia.mp3",
birth:"2005-12-12",
msg:"اختي الغاليه يا اغلي الناس ربنا يخليكي ليا ويحفظك من كل شر ❤️"
}

};

// login
function login(){

const p=document.getElementById("pass").value;

if(p==="love"){

showLoading(()=>{
document.getElementById("login").style.display="none";
document.getElementById("home").style.display="block";
document.getElementById("mainMusic").play();
});

}else{

alert("الباسورد غلط");

}

}

// loading
function showLoading(callback){

document.getElementById("loading").style.display="flex";

setTimeout(()=>{
document.getElementById("loading").style.display="none";
callback();
},2000);

}

// فتح الشخص
function openPerson(name){

const p=prompt("ادخل الباسورد");

if(p===data[name].pass){

document.getElementById("home").style.display="none";
document.getElementById("person").style.display="block";

document.getElementById("personName").innerHTML=name;
document.getElementById("personImg").src=data[name].img;
document.getElementById("personMsg").innerHTML=data[name].msg;

playMusic(data[name].music);

startAge(data[name].birth);

}else{

alert("غلط");

}

}

// رجوع
function back(){

document.getElementById("person").style.display="none";
document.getElementById("home").style.display="block";

document.getElementById("music").pause();
document.getElementById("mainMusic").play();

}

// music
function playMusic(src){

document.getElementById("mainMusic").pause();

const m=document.getElementById("music");
m.src=src;
m.play();

}

// عداد العمر
function startAge(birth){

setInterval(()=>{

const b=new Date(birth);
const now=new Date();

let y=now.getFullYear()-b.getFullYear();
let m=now.getMonth()-b.getMonth();
let d=now.getDate()-b.getDate();

document.getElementById("age").innerHTML=
y+" سنة "+m+" شهر "+d+" يوم";

},1000);

}

// القلوب
setInterval(()=>{
const h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"%";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},500);

</script>

</body>
</html>
