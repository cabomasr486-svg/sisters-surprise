<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💜 Sisters Surprise</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#3a0ca3,#7209b7,#f72585);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* النجوم */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:url("https://i.imgur.com/YKY28eT.png");
animation:moveStars 60s linear infinite;
opacity:.4;
}

@keyframes moveStars{
from{transform:translateY(0);}
to{transform:translateY(-1000px);}
}

/* الكارت */
.card{
position:relative;
width:340px;
padding:30px;
border-radius:25px;
text-align:center;
background:rgba(255,255,255,0.07);
backdrop-filter:blur(20px);
box-shadow:0 0 40px rgba(255,0,150,0.4);
color:white;
}

/* الاسم */
.name{
font-size:32px;
text-shadow:0 0 20px #ff4ecd;
margin-bottom:15px;
}

/* الصورة */
.avatar{
width:160px;
height:160px;
margin:auto;
border-radius:50%;
padding:4px;
background:linear-gradient(45deg,#ff00cc,#3333ff,#ff00cc);
animation:rotate 6s linear infinite;
}

.avatar img{
width:100%;
height:100%;
border-radius:50%;
}

@keyframes rotate{
0%{filter:hue-rotate(0deg);}
100%{filter:hue-rotate(360deg);}
}

/* رسالة */
.message{
margin-top:15px;
font-size:18px;
}

/* العداد */
.counter{
display:flex;
justify-content:center;
gap:10px;
margin-top:20px;
}

.box{
background:rgba(255,255,255,0.1);
padding:10px;
border-radius:15px;
width:80px;
}

.num{
font-size:20px;
color:#00eaff;
font-weight:bold;
}

.label{
font-size:13px;
color:#ccc;
}

/* زر */
button{
margin-top:20px;
padding:12px 30px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff00cc,#3333ff);
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 20px #ff00cc;
}

/* login */
#login{
display:block;
}

input{
padding:12px;
border-radius:20px;
border:none;
width:80%;
margin-top:15px;
}

.hidden{
display:none;
}
</style>
</head>
<body>

<!-- login -->
<div class="card" id="login">

<div class="name">💜 مرحباً</div>

<input type="password" id="pass" placeholder="ادخل الباسورد">

<br>

<button onclick="login()">دخول</button>

</div>


<!-- profile -->
<div class="card hidden" id="profile">

<div class="name" id="pname"></div>

<div class="avatar">
<img id="pimg" src="">
</div>

<div class="message" id="pmsg"></div>

<div class="counter">

<div class="box">
<div class="num" id="years">0</div>
<div class="label">سنة</div>
</div>

<div class="box">
<div class="num" id="months">0</div>
<div class="label">شهر</div>
</div>

<div class="box">
<div class="num" id="days">0</div>
<div class="label">يوم</div>
</div>

</div>

<button onclick="back()">رجوع</button>

</div>


<audio id="music"></audio>


<script>

const people = {

"eman2002":{
name:"Eman",
img:"eman.jpg",
msg:"اختي الغاليه ربنا يخليكي ليا ❤️",
birth:"2002-02-12",
music:"eman.mp3"
},

"zainab2000":{
name:"Zainab",
img:"zainab.jpg",
msg:"اجمل اخت في الدنيا 💜",
birth:"2000-09-16",
music:"zainab.mp3"
},

"rokaya2005":{
name:"Rokaya",
img:"rokaya.jpg",
msg:"ربنا يحفظك دايما ❤️",
birth:"2005-12-12",
music:"rokaya.mp3"
}

};


function login(){

const pass=document.getElementById("pass").value;

if(people[pass]){

const p=people[pass];

document.getElementById("login").classList.add("hidden");

document.getElementById("profile").classList.remove("hidden");

document.getElementById("pname").innerText=p.name;

document.getElementById("pimg").src=p.img;

document.getElementById("pmsg").innerText=p.msg;

document.getElementById("music").src=p.music;
document.getElementById("music").play();

calcAge(p.birth);

}else{

alert("الباسورد غلط");

}

}


function calcAge(birth){

const b=new Date(birth);
const now=new Date();

let years=now.getFullYear()-b.getFullYear();
let months=now.getMonth()-b.getMonth();
let days=now.getDate()-b.getDate();

if(days<0){
months--;
days+=30;
}

if(months<0){
years--;
months+=12;
}

document.getElementById("years").innerText=years;
document.getElementById("months").innerText=months;
document.getElementById("days").innerText=days;

}


function back(){

location.reload();

}

</script>

</body>
</html>
