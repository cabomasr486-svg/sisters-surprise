<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#3a0ca3,#7209b7,#b5179e);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* القلوب */
.heart{
  position:absolute;
  color:#ff4da6;
  font-size:20px;
  animation: float 6s linear infinite;
}

@keyframes float{
  0%{transform:translateY(100vh);opacity:0;}
  50%{opacity:1;}
  100%{transform:translateY(-10vh);opacity:0;}
}

/* الكارت */
.login-box{
  background: rgba(255,255,255,0.08);
  padding:30px;
  border-radius:20px;
  text-align:center;
  backdrop-filter: blur(10px);
  width:300px;
  color:white;
  box-shadow:0 0 30px rgba(0,0,0,0.4);
}

/* الدائرة */
.circle{
  width:120px;
  height:120px;
  border-radius:50%;
  border:6px solid rgba(255,255,255,0.2);
  border-top:6px solid #ff4da6;
  margin:auto;
  animation: spin 3s linear infinite;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

input{
  width:100%;
  padding:12px;
  margin-top:20px;
  border:none;
  border-radius:10px;
  outline:none;
  font-size:16px;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:12px;
  font-size:18px;
  color:white;
  background: linear-gradient(45deg,#ff4da6,#7b2ff7);
  cursor:pointer;
}

button:hover{
  opacity:0.8;
}
</style>

</head>
<body>

<!-- القلوب -->
<script>
for(let i=0;i<20;i++){
  let heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="❤";
  heart.style.left=Math.random()*100+"vw";
  heart.style.animationDuration=(3+Math.random()*5)+"s";
  heart.style.fontSize=(15+Math.random()*25)+"px";
  document.body.appendChild(heart);
}
</script>

<div class="login-box">

  <div class="circle">❤</div>

  <h2>😂 ثواني يا روحي</h2>

  <input type="password" id="pass" placeholder="ادخل الباسورد">

  <button onclick="login()">دخول</button>

</div>

<script>

/* غير الباسورد من هنا */
const PASSWORD = "1234";

function login(){

  let p=document.getElementById("pass").value;

  if(p === PASSWORD){

    window.location.href="home.html";

  }else{

    alert("الباسورد غلط");

  }

}

</script>

</body>
</html>
