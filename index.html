<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💜 Sisters Surprise</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#3a0ca3,#7209b7,#f72585);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
overflow:hidden;
}

/* النجوم */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:url("https://i.imgur.com/YKY28eT.png");
animation:stars 60s linear infinite;
opacity:0.3;
}

@keyframes stars{
from{transform:translateY(0);}
to{transform:translateY(-1000px);}
}

/* صندوق زجاجي */
.glass{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
padding:30px;
border-radius:25px;
text-align:center;
box-shadow:0 0 40px rgba(255,0,150,0.4);
width:340px;
}

/* العنوان */
.title{
font-size:32px;
margin-bottom:20px;
text-shadow:0 0 20px #ff4ecd;
}

/* input */
input{
width:90%;
padding:12px;
border-radius:20px;
border:none;
outline:none;
font-size:16px;
text-align:center;
}

/* زر */
button{
margin-top:15px;
padding:12px 30px;
border:none;
border-radius:20px;
background:linear-gradient(45deg,#ff0099,#493240);
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 20px #ff0099;
}

/* الصورة */
.avatar{
width:150px;
height:150px;
border-radius:50%;
margin:auto;
margin-bottom:15px;
border:4px solid #ff4ecd;
box-shadow:0 0 30px #ff4ecd;
background-size:cover;
background-position:center;
}

/* العداد الزجاجي */
.counter{
margin-top:15px;
padding:15px;
border-radius:20px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
font-size:18px;
box-shadow:0 0 20px rgba(255,255,255,0.3);
}

/* زر رجوع */
.back{
margin-top:15px;
background:linear-gradient(45deg,#00c6ff,#0072ff);
}

/* القلوب */
.heart{
position:absolute;
color:red;
animation:float 6s linear infinite;
}

@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

</style>
</head>
<body>

<div class="glass" id="loginBox">

<div class="title">💜 مرحباً</div>

<input type="password" id="password" placeholder="ادخل الباسورد">

<br>

<button onclick="login()">دخول</button>

</div>

<div class="glass" id="profileBox" style="display:none">

<div class="title" id="name"></div>

<div class="avatar" id="avatar"></div>

<button onclick="playMusic()">▶ تشغيل الأغنية</button>

<audio id="music"></audio>

<div class="counter" id="counter"></div>

<button class="back" onclick="back()">رجوع</button>

</div>

<script>

/* الباسورد الرئيسي */
const mainPassword="love";

/* البيانات */
const people={

"eman2002":{
name:"Eman",
birth:"2002-02-12",
image:"eman.jpg",
music:"eman.mp3"
},

"zainab2000":{
name:"Zainab",
birth:"2000-09-16",
image:"zainab.jpg",
music:"zainab.mp3"
},

"rokaya2005":{
name:"Rokaya",
birth:"2005-12-12",
image:"rokaya.jpg",
music:"rokaya.mp3"
}

};

let currentPerson=null;

/* تسجيل الدخول */
function login(){

let pass=document.getElementById("password").value;

if(pass===mainPassword){

alert("اختار باسورد الشخص");

}

else if(people[pass]){

currentPerson=people[pass];

showProfile();

}

else{

alert("الباسورد غلط");

}

}

/* عرض الصفحة */
function showProfile(){

document.getElementById("loginBox").style.display="none";
document.getElementById("profileBox").style.display="block";

document.getElementById("name").innerText=currentPerson.name;

document.getElementById("avatar").style.backgroundImage=
"url('"+currentPerson.image+"')";

document.getElementById("music").src=currentPerson.music;

updateCounter();

}

/* تشغيل الأغنية */
function playMusic(){

document.getElementById("music").play();

}

/* العداد */
function updateCounter(){

let birth=new Date(currentPerson.birth);
let now=new Date();

let years=now.getFullYear()-birth.getFullYear();
let months=now.getMonth()-birth.getMonth();
let days=now.getDate()-birth.getDate();

if(days<0){
months--;
days+=30;
}

if(months<0){
years--;
months+=12;
}

document.getElementById("counter").innerHTML=
years+" سنة 💜 "+months+" شهر 💜 "+days+" يوم";

}

setInterval(updateCounter,1000);

/* رجوع */
function back(){

document.getElementById("profileBox").style.display="none";
document.getElementById("loginBox").style.display="block";

}

/* قلوب متحركة */
setInterval(()=>{

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*20)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

},500);

</script>

</body>
</html>
