<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ليكو ياحبايب قلبي ❤️</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#111,#1c1c1c);
color:white;
text-align:center;
}

.screen{
display:none;
padding:20px;
min-height:100vh;
}

.active{
display:block;
}

input{
padding:12px;
border:none;
border-radius:10px;
margin:10px;
font-size:16px;
}

button{
padding:12px 25px;
border:none;
border-radius:25px;
background:#ff2e63;
color:white;
font-size:16px;
cursor:pointer;
margin:10px;
transition:.3s;
}

button:hover{
transform:scale(1.05);
background:#ff004f;
}

.cover{
width:90%;
max-width:350px;
border-radius:20px;
box-shadow:0 0 25px rgba(255,0,100,.5);
margin-top:20px;
}

.photo{
width:85%;
max-width:300px;
border-radius:20px;
margin-top:20px;
box-shadow:0 0 20px rgba(255,255,255,.3);
}

.glass{
background:rgba(255,255,255,.1);
backdrop-filter:blur(10px);
padding:15px;
border-radius:15px;
margin:20px auto;
width:80%;
max-width:300px;
font-size:18px;
}
</style>
</head>

<body>

<!-- شاشة الباسورد -->
<div id="login" class="screen active">
<h2>ادخلي الباسورد 💌</h2>
<input type="password" id="mainPass" placeholder="الباسورد الرئيسي">
<br>
<button onclick="checkMain()">دخول</button>
</div>

<!-- الشاشة الرئيسية -->
<div id="home" class="screen">

<img src="cover.gif" class="cover">

<audio id="mainMusic" src="main.mp3" autoplay loop></audio>

<h2>اختاري اسمك 🌚♥</h2>

<button onclick="openPage('eman')">ايمان</button>
<button onclick="openPage('rokaia')">رقيه</button>
<button onclick="openPage('zainab')">زينب</button>

<p style="margin-top:20px;font-size:17px;">
انتم نعمة من ربنا في حياتي ❤️  
وجودكم جنبي أكبر هدية في الدنيا  
وربنا يخليكو ليا دايماً ياحبايب قلبي 💕
</p>

<h3>ليكو ياحبايب قلبي ❤️</h3>

</div>

<!-- صفحة ايمان -->
<div id="eman" class="screen">
<h2>ايمان ❤️</h2>
<img src="eman.jpg" class="photo">
<audio src="eman.mp3" controls></audio>
<div class="glass" id="count1"></div>
<button onclick="goHome()">رجوع</button>
</div>

<!-- صفحة رقيه -->
<div id="rokaia" class="screen">
<h2>رقيه ❤️</h2>
<img src="rokaia.jpg" class="photo">
<audio src="rokaia.mp3" controls></audio>
<div class="glass" id="count2"></div>
<button onclick="goHome()">رجوع</button>
</div>

<!-- صفحة زينب -->
<div id="zainab" class="screen">
<h2>زينب ❤️</h2>
<img src="zainab.jpg" class="photo">
<audio src="zainab.mp3" controls></audio>
<div class="glass" id="count3"></div>
<button onclick="goHome()">رجوع</button>
</div>

<script>

function checkMain(){
let pass=document.getElementById("mainPass").value;
if(pass==="love"){
document.getElementById("login").classList.remove("active");
document.getElementById("home").classList.add("active");
}else{
alert("الباسورد غلط 😅");
}
}

function openPage(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function goHome(){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById("home").classList.add("active");
}

function counter(date,id){
let target=new Date(date).getTime();
setInterval(()=>{
let now=new Date().getTime();
let diff=now-target;

let days=Math.floor(diff/(1000*60*60*24));
let years=Math.floor(days/365);

document.getElementById(id).innerHTML=
"عدى " + years + " سنة و " + (days%365) + " يوم 💖";
},1000);
}

counter("2002-02-12","count1");
counter("2005-12-12","count2");
counter("2000-09-16","count3");

</script>

</body>
</html>
