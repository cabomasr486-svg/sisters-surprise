<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اخواتي 💜</title>

<style>

body{
margin:0;
font-family:Tahoma;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;
color:#333;
}

/* صندوق */
.box{
background:white;
margin:30px;
padding:20px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

/* زر */
button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#e63950;
}

/* input */
input{
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

/* صورة */
img{
width:200px;
border-radius:15px;
margin-top:10px;
}

/* الاسم */
.name{
font-size:24px;
color:#ff4d6d;
margin-top:10px;
}

/* الرسالة */
.msg{
margin-top:10px;
font-size:18px;
}

/* العداد */
.age{
margin-top:10px;
color:#555;
}

</style>
</head>
<body>

<audio id="mainMusic" src="main.mp3" loop></audio>
<audio id="zMusic" src="zainab.mp3" loop></audio>
<audio id="eMusic" src="eman.mp3" loop></audio>
<audio id="rMusic" src="rokia.mp3" loop></audio>

<!-- صفحة الباسورد -->
<div id="login" class="box">

<h2>ادخل الباسورد</h2>

<input type="password" id="mainPass">

<br>

<button onclick="login()">دخول</button>

</div>

<!-- الصفحة الرئيسية -->
<div id="home" style="display:none" class="box">

<h2>اخواتي وحبايب قلبي 💜</h2>

<p>اضغطي على اسمك</p>

<button onclick="openPage('zainab')">Zainab</button>
<button onclick="openPage('eman')">Eman</button>
<button onclick="openPage('rokia')">Rokia</button>

</div>

<!-- زينب -->
<div id="zainab" style="display:none" class="box">

<div class="name">Zainab</div>

<img src="zainab.jpg">

<div class="msg">
اختي الكبيره الغاليه يا اغلي الناس ربنا يخليكي ليا ويحفظك من كل شر 🤲❤
</div>

<div class="age" id="ageZ"></div>

<button onclick="back()">رجوع</button>

</div>

<!-- ايمان -->
<div id="eman" style="display:none" class="box">

<div class="name">Eman</div>

<img src="eman.jpg">

<div class="msg">
اختي الغاليه يا اغلي الناس ربنا يخليكي ليا ويحفظك من كل شر 🤲❤
</div>

<div class="age" id="ageE"></div>

<button onclick="back()">رجوع</button>

</div>

<!-- رقية -->
<div id="rokia" style="display:none" class="box">

<div class="name">Rokia</div>

<img src="rokia.jpg">

<div class="msg">
اختي الغاليه يا اغلي الناس ربنا يخليكي ليا ويحفظك من كل شر 🤲❤
</div>

<div class="age" id="ageR"></div>

<button onclick="back()">رجوع</button>

</div>

<script>

const PASSWORD="love";

const zDate=new Date("2000-09-16");
const eDate=new Date("2002-02-12");
const rDate=new Date("2005-12-12");

function login(){

let pass=document.getElementById("mainPass").value;

if(pass===PASSWORD){

login.style.display="none";
home.style.display="block";

mainMusic.play();

}else{

alert("الباسورد غلط");

}

}

function openPage(name){

home.style.display="none";

mainMusic.pause();
zMusic.pause();
eMusic.pause();
rMusic.pause();

document.getElementById(name).style.display="block";

if(name=="zainab") zMusic.play();
if(name=="eman") eMusic.play();
if(name=="rokia") rMusic.play();

}

function back(){

zainab.style.display="none";
eman.style.display="none";
rokia.style.display="none";

home.style.display="block";

mainMusic.play();

}

function calcAge(birth){

let now=new Date();

let age=now.getFullYear()-birth.getFullYear();

return "العمر: "+age+" سنة";

}

ageZ.innerHTML=calcAge(zDate);
ageE.innerHTML=calcAge(eDate);
ageR.innerHTML=calcAge(rDate);

</script>

</body>
</html>
