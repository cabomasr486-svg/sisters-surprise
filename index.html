<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اخواتي وروح قلبي ❤️</title>

<style>

/* الخلفية */

body{
margin:0;
font-family:Arial;
background: linear-gradient(135deg,#1a002b,#5f0a87,#ff4e8a);
color:white;
text-align:center;
overflow-x:hidden;
}

/* شاشة */

.screen{
display:none;
padding:20px;
}

.active{
display:block;
}

/* كارت زجاجي */

.glass{
background: rgba(255,255,255,0.12);
backdrop-filter: blur(20px);
border-radius:20px;
padding:20px;
margin:15px;
box-shadow:0 8px 32px rgba(0,0,0,0.4);
border:1px solid rgba(255,255,255,0.2);
}

/* الصور */

.cover{
width:90%;
max-width:320px;
border-radius:20px;
box-shadow:0 0 25px rgba(255,255,255,0.4);
}

.photo{
width:200px;
height:200px;
border-radius:20px;
object-fit:cover;
box-shadow:0 0 25px rgba(255,255,255,0.5);
}

/* الأزرار */

button{
background: linear-gradient(45deg,#ff4e8a,#ff9a44);
border:none;
padding:12px 25px;
border-radius:15px;
color:white;
font-size:18px;
margin:10px;
box-shadow:0 0 15px rgba(255,255,255,0.4);
cursor:pointer;
}

/* العداد */

.counter{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:20px;
}

.counter div{
background: rgba(255,255,255,0.15);
backdrop-filter: blur(10px);
padding:15px;
border-radius:15px;
}

/* القلوب */

.heart{
position:fixed;
color:rgba(255,255,255,0.4);
animation:float 6s linear infinite;
font-size:20px;
}

@keyframes float{
from{
transform:translateY(100vh);
opacity:1;
}
to{
transform:translateY(-10vh);
opacity:0;
}
}

</style>
</head>
<body>

<!-- الصوت العام -->

<audio id="mainAudio" autoplay loop>
<source src="main.mp3" type="audio/mp3">
</audio>

<!-- الشاشة الرئيسية -->

<div id="home" class="screen active">

<img src="cover.gif" class="cover">

<h2>اخواتي وروح قلبي ❤️</h2>

<button onclick="showScreen('names')">
اختاري اسمك 🌚♥
</button>

<div class="glass">
<h3>ليكو يا حبايب قلبي ❤️</h3>

<p>
يارب دايما لي أخواتي ومتحرمنيش منهم واشوفهم مبسوطين ومتهنيين ❤️
</p>

</div>

</div>

<!-- شاشة الاسماء -->

<div id="names" class="screen">

<h2>اختاري اسمك ❤️</h2>

<button onclick="openPerson('eman')">ايمان</button>
<button onclick="openPerson('rokia')">رقية</button>
<button onclick="openPerson('zainab')">زينب</button>

<br>

<button onclick="showScreen('home')">رجوع</button>

</div>

<!-- شاشة ايمان -->

<div id="eman" class="screen">

<img src="eman.jpg" class="photo">

<div class="glass">

<h2>ايمان ❤️</h2>

<div class="counter" id="counter_eman"></div>

<button onclick="surprise()">اضغطي هنا 🌚❤️</button>

</div>

<button onclick="backNames()">رجوع</button>

<audio autoplay loop>
<source src="eman.mp3">
</audio>

</div>

<!-- شاشة رقية -->

<div id="rokia" class="screen">

<img src="rokia.jpg" class="photo">

<div class="glass">

<h2>رقية ❤️</h2>

<div class="counter" id="counter_rokia"></div>

<button onclick="surprise()">اضغطي هنا 🌚❤️</button>

</div>

<button onclick="backNames()">رجوع</button>

<audio autoplay loop>
<source src="rokia.mp3">
</audio>

</div>

<!-- شاشة زينب -->

<div id="zainab" class="screen">

<img src="zainab.jpg" class="photo">

<div class="glass">

<h2>زينب ❤️</h2>

<div class="counter" id="counter_zainab"></div>

<button onclick="surprise()">اضغطي هنا 🌚❤️</button>

</div>

<button onclick="backNames()">رجوع</button>

<audio autoplay loop>
<source src="zainab.mp3">
</audio>

</div>

<script>

/* تغيير الشاشة */

function showScreen(id){

document.querySelectorAll(".screen")
.forEach(s=>s.classList.remove("active"))

document.getElementById(id)
.classList.add("active")

}

/* فتح الشخص */

function openPerson(name){

showScreen(name)

}

/* رجوع */

function backNames(){

showScreen("names")

}

/* المفاجأة */

function surprise(){

alert("ربنا يخليكي يا اغلي اخت ف الدنيا 🥺❤️")

}

/* حساب العداد بدقة */

function updateCounter(id,date){

let now=new Date()

let diff=now-date

let seconds=Math.floor(diff/1000)
let minutes=Math.floor(seconds/60)
let hours=Math.floor(minutes/60)
let days=Math.floor(hours/24)
let years=Math.floor(days/365)

days%=365
hours%=24
minutes%=60
seconds%=60

document.getElementById(id).innerHTML=`

<div>${years}<br>سنة</div>
<div>${days}<br>يوم</div>
<div>${hours}<br>ساعة</div>
<div>${minutes}<br>دقيقة</div>
<div>${seconds}<br>ثانية</div>

`

}

setInterval(()=>{

updateCounter("counter_eman",new Date("2002-02-12"))
updateCounter("counter_rokia",new Date("2004-01-01"))
updateCounter("counter_zainab",new Date("2006-01-01"))

},1000)

/* القلوب */

setInterval(()=>{

let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤️"
heart.style.left=Math.random()*100+"%"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),6000)

},500)

</script>

</body>
</html>
