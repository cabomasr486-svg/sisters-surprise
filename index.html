<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Style Login</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f0f0f;
font-family:Tahoma;
overflow:hidden;
}

/* خلفية نيون متحركة */
body::before{
content:"";
position:absolute;
width:300px;
height:300px;
background:radial-gradient(circle,#ff0050,#00f2ea);
filter:blur(120px);
animation:move 6s infinite alternate;
opacity:0.4;
}

@keyframes move{
0%{transform:translate(-150px,-100px);}
100%{transform:translate(150px,100px);}
}

/* الكارد */
.box{
position:relative;
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:25px;
text-align:center;
backdrop-filter:blur(20px);
box-shadow:0 0 40px rgba(255,0,80,0.4);
width:320px;
z-index:2;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:scale(0.8);}
to{opacity:1;transform:scale(1);}
}

/* الدائرة */
.circle{
width:180px;
height:180px;
margin:auto;
position:relative;
}

svg{
transform:rotate(-90deg);
}

circle{
fill:none;
stroke-width:12;
stroke-linecap:round;
}

.bg{
stroke:#222;
}

.progress{
stroke:url(#grad);
stroke-dasharray:502;
stroke-dashoffset:502;
transition:stroke-dashoffset 0.1s linear;
}

/* الرقم */
.percent{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:28px;
font-weight:bold;
}

/* النص */
.title{
color:white;
margin-top:20px;
font-size:20px;
}

/* الإدخال */
input{
width:100%;
padding:12px;
border-radius:15px;
border:none;
margin-top:15px;
font-size:16px;
text-align:center;
background:#1e1e1e;
color:white;
outline:none;
}

/* الزر */
button{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:15px;
background:linear-gradient(45deg,#ff0050,#00f2ea);
color:white;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 20px #ff0050;
}

</style>
</head>
<body>

<div class="box">

<div class="circle">
<svg width="180" height="180">

<defs>
<linearGradient id="grad">
<stop offset="0%" stop-color="#ff0050"/>
<stop offset="100%" stop-color="#00f2ea"/>
</linearGradient>
</defs>

<circle class="bg" cx="90" cy="90" r="80"/>
<circle class="progress" cx="90" cy="90" r="80"/>
</svg>

<div class="percent">0%</div>
</div>

<div class="title">جاري التحقق...</div>

<input type="password" placeholder="ادخل الباسورد">
<button onclick="startLoading()">دخول</button>

</div>

<script>

let percent = 0;
let progress = document.querySelector(".progress");
let text = document.querySelector(".percent");
let title = document.querySelector(".title");

function startLoading(){

percent = 0;

let interval = setInterval(()=>{

percent++;
text.innerHTML = percent + "%";

let offset = 502 - (502 * percent / 100);
progress.style.strokeDashoffset = offset;

if(percent >= 100){
clearInterval(interval);
title.innerHTML = "تم الدخول بنجاح ❤️";
setTimeout(()=>{
window.location.href="https://tiktok.com";
},1000);
}

},30);

}

</script>

</body>
</html>
