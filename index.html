<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اخواتي وروح قلبي ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
overflow:hidden;
}

/* loading */
#loading{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
z-index:999;
animation:fadeOut 3s forwards;
animation-delay:2s;
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}

/* stars */
.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://assets.codepen.io/13471/sparkles.gif");
z-index:-1;
opacity:0.4;
}

/* hearts */
.heart{
position:fixed;
color:red;
animation:float 6s linear infinite;
}

@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

/* glass */
.glass{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
padding:20px;
margin:10px;
border-radius:20px;
}

/* buttons */
button{
padding:12px 25px;
border:none;
border-radius:10px;
background:pink;
font-size:18px;
margin:5px;
}

/* cover */
#cover{
width:220px;
border-radius:20px;
margin-top:20px;
box-shadow:0 0 20px pink;
}

/* person image */
#personPhoto{
width:200px;
border-radius:20px;
margin-top:15px;
box-shadow:0 0 25px pink;
}

/* glow text */
.glow{
font-size:28px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px pink;}
to{text-shadow:0 0 25px red;}
}

</style>
</head>
<body>

<div class="stars"></div>

<div id="loading">
❤️ جاري التحميل السينمائي...
</div>

<audio id="mainMusic" src="main.mp3" loop></audio>
<audio id="zainabMusic" src="zainab.mp3" loop></audio>
<audio id="emanMusic" src="eman.mp3" loop></audio>
<audio id="rokaiaMusic" src="rokaia.mp3" loop></audio>

<!-- main password -->
<div id="login" class="glass" style="margin-top:120px;">
<h2>ادخل الباسورد ❤️</h2>
<input type="password" id="mainPass">
<br><br>
<button onclick="checkMain()">دخول</button>
</div>

<!-- main page -->
<div id="home" style="display:none;">

<img id="cover" src="cover.gif">

<div class="glass">
<h2 class="glow">اخواتي وحبايب قلبي ❤️</h2>

<p>
اخواتي وحبايب قلبي واغلي من عمري اتمني من ربنا انكو تفضلو سند ليا وانا اكون سند ليكو وربنا مايحرمنا من بعض طول العمر ❤️
</p>

<h3>اضغطي على اسمك</h3>

<button onclick="openPerson('zainab')">زينب</button>
<button onclick="openPerson('eman')">إيمان</button>
<button onclick="openPerson('rokaia')">رقيه</button>

</div>

</div>

<!-- person password -->
<div id="personLogin" style="display:none;" class="glass">
<h2 id="personTitle"></h2>
<input type="password" id="personPass">
<br><br>
<button onclick="checkPerson()">فتح</button>
</div>

<!-- person page -->
<div id="personPage" style="display:none;">

<h2 id="personName" class="glow"></h2>

<img id="personPhoto">

<p id="personMsg"></p>

<p id="age"></p>

<button onclick="back()">رجوع</button>

</div>

<script>

let current="";
let birth;

/* main password */
function checkMain(){

if(document.getElementById("mainPass").value=="love"){

document.getElementById("login").style.display="none";
document.getElementById("home").style.display="block";

document.getElementById("mainMusic").play();

}
}

/* open person */
function openPerson(name){

current=name;

document.getElementById("home").style.display="none";
document.getElementById("personLogin").style.display="block";

document.getElementById("personTitle").innerText="باسورد "+name;

}

/* person passwords */
function checkPerson(){

let pass=document.getElementById("personPass").value;

if(current=="zainab" && pass=="zozo") showPerson();
if(current=="eman" && pass=="emo") showPerson();
if(current=="rokaia" && pass=="roro") showPerson();

}

/* show person */
function showPerson(){

document.getElementById("personLogin").style.display="none";
document.getElementById("personPage").style.display="block";

document.getElementById("mainMusic").pause();

let music;

if(current=="zainab"){

document.getElementById("personName").innerText="زينب ❤️";
document.getElementById("personPhoto").src="zainab-2.jpg";

document.getElementById("personMsg").innerText=
"اختي الغاليه يا اغلي الناس ربنا يخليكي ليا ويحفظك من كل شر ويفرحك علطول واتمني اشوفك اكتر مابتخيل ❤️";

birth=new Date(2000,8,16);
music=document.getElementById("zainabMusic");

}

if(current=="eman"){

document.getElementById("personName").innerText="إيمان ❤️";
document.getElementById("personPhoto").src="eman-2.jpg";

document.getElementById("personMsg").innerText=
"اختي الغاليه يا اغلي الناس ربنا يخليكي ليا ويحفظك من كل شر ويفرحك علطول واتمني اشوفك اكتر مابتخيل ❤️";

birth=new Date(2000,1,1);
music=document.getElementById("emanMusic");

}

if(current=="rokaia"){

document.getElementById("personName").innerText="رقيه ❤️";
document.getElementById("personPhoto").src="rokaia-2.jpg";

document.getElementById("personMsg").innerText=
"اختي الغاليه يا اغلي الناس ربنا يخليكي ليا ويحفظك من كل شر ويفرحك علطول واتمني اشوفك اكتر مابتخيل ❤️";

birth=new Date(2000,11,1);
music=document.getElementById("rokaiaMusic");

}

music.play();

setInterval(updateAge,1000);

}

/* age counter */
function updateAge(){

let now=new Date();

let diff=now-birth;

let years=Math.floor(diff/31536000000);
let months=Math.floor(diff/2592000000)%12;
let days=Math.floor(diff/86400000)%30;
let hours=Math.floor(diff/3600000)%24;
let minutes=Math.floor(diff/60000)%60;
let seconds=Math.floor(diff/1000)%60;

document.getElementById("age").innerText=
years+" سنة "+
months+" شهر "+
days+" يوم "+
hours+" ساعة "+
minutes+" دقيقة "+
seconds+" ثانية";

}

/* back */
function back(){

location.reload();

}

/* hearts animation */
setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerText="❤️";
heart.style.left=Math.random()*100+"%";
heart.style.fontSize=(20+Math.random()*30)+"px";
document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

},500);

</script>

</body>
</html>
